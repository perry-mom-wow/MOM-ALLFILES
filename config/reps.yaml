  - Hi Sophie,
  - Great speaking earlier — really exciting to hear more about the Interstellar Summit.
    It sounds like a fantastic event, and we’d love to be involved.
  - Following our conversation, I’ve outlined a proposal for Mom-Wow to partner with
    you across both days.
  - We’d propose bringing a fully branded functional juice bar experience to the summit,
    operating throughout May 6–7. As the exclusive juice partner on-site, we’d serve
    approximately 200–250 bottles across the event, giving attendees access to performance-focused,
    functional beverages aligned with the summit’s theme of workplace optimisation.
  - We see strong value in integrating into the key networking moments — the Day 1
    mixer and Day 2 after party — where we can create a high-impact brand presence
    while also driving sampling and engagement. I would be there to introduce the
    products, explain the benefits, and connect with attendees directly.
  - In terms of setup, we’re flexible depending on the venue logistics. We can either
    create a clean indoor activation (branded table/booth), or, if outdoor access
    allows, bring a VW T1 van for a more distinctive and memorable experience.
  - From a commercial standpoint, a full sponsorship isn’t feasible for us at this
    stage, so we’d be looking at a commercial partnership model. This would involve
    supplying product at a partner rate, with Mom-Wow handling the activation, presence,
    and overall experience. We’re also open to exploring a co-sponsorship with a complementary
    partner if that helps expand the activation.
  - At the moment, final pricing is still dependent on co-packer costs, which we expect
    to confirm within the next 2–3 weeks. We’re also on track to have our first HPP
    batch ready by the event, extending shelf life and simplifying logistics.
  - Overall, we think this is a great fit — particularly given the international audience
    and strong UK presence, where there’s already familiarity with functional mushroom
    products.
  - Let me know your thoughts, and happy to jump on a call to refine details or align
    on next steps.
  - Best,
  - Laura Marin.
